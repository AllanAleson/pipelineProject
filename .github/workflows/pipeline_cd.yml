name: Pipeline Demo CI/CD

on:
  workflow_run:
    workflows:
      - Pipeline Main CI
    types:
      - completed
  workflow_dispatch:

jobs:
  deliver:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Prepare artifact
        run: |
          mkdir -p dist/pipeline-demo
          cp app.py requirements.txt README.md dist/pipeline-demo/
          cp test_app.py dist/pipeline-demo/

      - name: Upload delivery artifact
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-demo-${{ github.event.workflow_run.head_sha || github.sha }}
          path: dist/pipeline-demo
        